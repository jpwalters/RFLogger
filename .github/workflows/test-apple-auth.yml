name: Test Apple Authentication

on:
  workflow_dispatch:

jobs:
  test-apple-auth:
    runs-on: macos-14
    name: Verify Apple Signing & Notarization Credentials

    steps:
      - name: Check secrets are set
        run: |
          ok=true
          for secret_name in CERTIFICATE P12_PASS TEAM_ID NOTARY_USER NOTARY_PASSWORD IDENTITY_NAME; do
            eval val="\$$secret_name"
            if [ -z "$val" ]; then
              echo "::error::Secret is not set: $secret_name"
              ok=false
            else
              echo "✓ $secret_name is set (${#val} chars)"
            fi
          done
          $ok || exit 1
        env:
          CERTIFICATE:    ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASS:       ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TEAM_ID:        ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_USER:    ${{ secrets.APPLE_NOTARY_USER }}
          NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          IDENTITY_NAME:  ${{ secrets.APPLE_IDENTITY_NAME }}

      - name: Import signing certificate
        env:
          P12_B64:  ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -o pipefail

          CLEAN_P12_B64=$(echo "$P12_B64" | tr -d '[:space:]')
          CLEAN_PASS=$(echo "$P12_PASS" | tr -d '\n\r')

          echo "$CLEAN_P12_B64" | base64 --decode > /tmp/DeveloperID.p12

          openssl pkcs12 -nodes -in /tmp/DeveloperID.p12 \
            -passin "pass:$CLEAN_PASS" -out /tmp/cert.pem
          openssl pkcs12 -export -in /tmp/cert.pem \
            -passout "pass:$CLEAN_PASS" -out /tmp/DeveloperID_legacy.p12
          rm -f /tmp/DeveloperID.p12 /tmp/cert.pem

          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -lut 3600 build.keychain

          security import /tmp/DeveloperID_legacy.p12 -k build.keychain \
            -P "$CLEAN_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASS" build.keychain

          rm -f /tmp/DeveloperID_legacy.p12

          echo "✓ Certificate imported successfully"

      - name: Verify signing identity
        run: |
          IDENTITY="Developer ID Application: ${{ secrets.APPLE_IDENTITY_NAME }}"
          echo "Looking for identity: $IDENTITY"

          security find-identity -v -p codesigning build.keychain

          if security find-identity -v -p codesigning build.keychain | grep -q "$IDENTITY"; then
            echo "✓ Signing identity found"
          else
            echo "::error::Signing identity '$IDENTITY' not found in keychain"
            exit 1
          fi

      - name: Test codesign with a dummy binary
        run: |
          # Create a minimal executable to test signing
          echo 'int main() { return 0; }' > /tmp/test.c
          clang -o /tmp/test_binary /tmp/test.c

          IDENTITY="Developer ID Application: ${{ secrets.APPLE_IDENTITY_NAME }}"
          codesign --force --options runtime --sign "$IDENTITY" /tmp/test_binary

          codesign --verify --verbose /tmp/test_binary
          echo "✓ Codesign succeeded"

      - name: Test notarytool credentials
        env:
          APPLE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_USER:     ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          # Use --info on a fake ID to validate credentials without submitting
          # A successful auth returns "not found" (2); bad credentials return 69 (401)
          xcrun notarytool info "00000000-0000-0000-0000-000000000000" \
            --apple-id "$APPLE_NOTARY_USER" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" 2>&1 && true

          STATUS=$?
          if [ $STATUS -eq 69 ]; then
            echo "::error::Notarytool authentication failed (HTTP 401). Check APPLE_NOTARY_USER, APPLE_NOTARY_PASSWORD, and APPLE_TEAM_ID."
            exit 1
          fi

          echo "✓ Notarytool credentials are valid (exit code: $STATUS)"
