name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  QT_VERSION: "6.7.3"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            artifact: RFLogger-Windows-x64
          - os: macos-14
            name: macOS-arm64
            artifact: RFLogger-macOS-arm64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=arm64
          - os: ubuntu-latest
            name: Linux
            artifact: RFLogger-Linux-x64

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: 'qtserialport'
          cache: true

      - name: Install Ninja
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Set up MSVC dev environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libudev-dev \
            libcups2-dev

      - name: Extract version from tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building version: $VERSION"

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DRFLOGGER_VERSION="${{ env.RELEASE_VERSION }}"
          -DRFLOGGER_BUILD_TESTS=ON
          -DRFLOGGER_ENABLE_RTLSDR=OFF
          ${{ runner.os == 'Linux' && '-GNinja' || '' }}
          ${{ matrix.cmake_extra || '' }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure -C Release

      # ── Package ──────────────────────────────────────────────────────────

      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cmake --install build --config Release
          cd build && cpack -G NSIS -C Release
          mv RFLogger-*.exe "$GITHUB_WORKSPACE/${{ matrix.artifact }}.exe"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          APP="build/RFLogger.app"
          macdeployqt "$APP" -dmg
          mv build/RFLogger.dmg "${{ matrix.artifact }}.dmg"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          # Install into AppDir structure
          DESTDIR="$PWD/AppDir" cmake --install build --prefix /usr

          # Ensure desktop file and icon are in place
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/32x32/apps
          cp resources/rflogger.desktop AppDir/usr/share/applications/
          cp resources/icons/rflogger.png AppDir/usr/share/icons/hicolor/32x32/apps/

          # Download linuxdeploy and Qt plugin
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          wget -q "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

          # Build AppImage
          export QMAKE="$(which qmake6 2>/dev/null || which qmake)"
          export EXTRA_QT_PLUGINS="serialport"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage
          mv RFLogger-*.AppImage "${{ matrix.artifact }}.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.exe
            ${{ matrix.artifact }}.dmg
            ${{ matrix.artifact }}.AppImage
          if-no-files-found: ignore

      # ── macOS Signing & Notarization ─────────────────────────────────────

      - name: Import signing certificate
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          P12_B64:  ${{ secrets.APPLE_CERTIFICATE_P12 }}
          P12_PASS: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -o pipefail

          if [ -z "$P12_B64" ] || [ -z "$P12_PASS" ]; then
            echo "::error::APPLE_CERTIFICATE_P12 and/or APPLE_CERTIFICATE_PASSWORD secrets are not set."
            exit 1
          fi

          CLEAN_P12_B64=$(echo "$P12_B64" | tr -d '[:space:]')
          CLEAN_PASS=$(echo "$P12_PASS" | tr -d '\n\r')

          echo "$CLEAN_P12_B64" | base64 --decode > /tmp/DeveloperID.p12

          # Re-encode with legacy ciphers for macOS Keychain compatibility
          openssl pkcs12 -nodes -in /tmp/DeveloperID.p12 \
            -passin "pass:$CLEAN_PASS" -out /tmp/cert.pem
          openssl pkcs12 -export -in /tmp/cert.pem \
            -passout "pass:$CLEAN_PASS" -out /tmp/DeveloperID_legacy.p12
          rm -f /tmp/DeveloperID.p12 /tmp/cert.pem

          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASS" build.keychain
          security set-keychain-settings -lut 3600 build.keychain

          security import /tmp/DeveloperID_legacy.p12 -k build.keychain \
            -P "$CLEAN_PASS" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASS" build.keychain

          rm -f /tmp/DeveloperID_legacy.p12

      - name: Sign and notarize macOS app
        if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_TEAM_ID:         ${{ secrets.APPLE_TEAM_ID }}
          APPLE_NOTARY_USER:     ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
        run: |
          APP="build/RFLogger.app"
          IDENTITY="Developer ID Application: ${{ secrets.APPLE_IDENTITY_NAME }}"

          codesign --force --deep --options runtime \
            --sign "$IDENTITY" "$APP"

          # Build DMG for notarization
          macdeployqt "$APP" -dmg
          DMG="build/RFLogger.dmg"

          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_NOTARY_USER" \
            --password "$APPLE_NOTARY_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 10m

          xcrun stapler staple "$DMG"
          mv "$DMG" "${{ matrix.artifact }}.dmg"

  # ── Release ──────────────────────────────────────────────────────────────

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        working-directory: artifacts
        run: |
          find . -type f \( -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" \) \
            -exec sha256sum {} + | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/SHA256SUMS.txt
